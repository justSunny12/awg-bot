# conf/limits.yaml — лимиты потребления (трафика). Считается в рамках
# КАЛЕНДАРНОГО месяца: 1-го числа накопление обнуляется, лимиты переходят как есть.

# Разовая доп.квота при первом превышении тотал-лимита в текущем месяце
# (до конца месяца, повторно в этом месяце не выдаётся), ГБ.
traffic_bonus_gb: 100

# Порог пред-уведомления «приближаешься к лимиту», % от лимита (клиент и устройство).
traffic_warn_percent: 80
