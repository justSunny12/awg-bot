# conf/bot_identity.yaml — публичное имя и описания бота.
#
# Устанавливаются кодом при КАЖДОМ старте через Bot API (setMyName/
# setMyDescription/setMyShortDescription) — то есть то, что видно в профиле
# бота в Телеграме (в т.ч. анонимно, без старта диалога), берётся ИМЕННО
# отсюда, а не из настроек, вбитых когда-то вручную в BotFather. Правки
# BotFather переживут только до следующего рестарта бота — дальше перетрутся
# этими значениями.
#
# Намеренно нейтральные/маскирующие формулировки — ничего не должно выдавать
# назначение бота стороннему наблюдателю профиля.

name: "Очень забывчивый бот"

