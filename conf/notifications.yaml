# conf/notifications.yaml — тумблеры уведомлений АДМИНУ о событиях клиентов.
# Каждое событие можно выключить независимо; выключенное просто не шлётся админу
# (на клиента/друга это не влияет). Все применяются на горячую.

client_events:
  activation: true      # клиент активировал инвайт (новый друг подключился)
  grace: true           # клиент сам продлился на пару недель (grace)
  over_limit: true      # клиент превысил месячный лимит трафика
  bonus: true           # клиенту выдана разовая бонус-квота при превышении
