# conf/resource_alerts.yaml — алерты владельцу о высокой загрузке ХОСТА
# (CPU / RAM / диск). Метрики бот снимает сам, локально (/proc + statvfs) на
# каждом тике монитора; здесь — пороги, гистерезис считает бот.
#
# Срабатывание и отбой — по СТРИКУ: значение держится выше/ниже порога
# monitoring.alert_streak замеров подряд (app.yaml; при 5 × тик 3 мин ≤ 15 мин).
# Уведомление обычное: в тихие часы приходит без звука.

enabled: true                # общий выключатель всей фичи

thresholds_percent:          # порог срабатывания по каждому ресурсу, %
  cpu: 80
  ram: 80
  disk: 80
