# conf/app.yaml — инфраструктура приложения (не бизнес-правила).
# Секреты (BOT_TOKEN, ADMIN_ID) СЮДА НЕ КЛАДЁМ — они только из окружения/.env.
# Крипто-материал AWG (ключи, psk, обфускация awg-протокола, порт) тоже не тут — его читает
# live из контейнера awg.py, чтобы не заводить второй источник истины.

timezone: "Europe/Moscow"          # UTC+3, без переходов на летнее время

# Docker / AmneziaWG — deploy-параметры
docker:
  container: "amnezia-awg2"
  interface: "awg0"
  awg_dir: "/opt/amnezia/awg"

# Сеть: сервер занимает .0, клиенты идут с .1 (квирк докерной Amnezia)
network:
  subnet_prefix: "10.8.1"
  subnet_cidr: "10.8.1.0/24"     # читает install/harden_firewall.sh (SSH-вайтлист)
  ip_host_start: 1                 # первый выдаваемый хост (.1); .0 — сервер
  ip_host_end: 254
  # ── ДЕПЛОЙ-ЗНАЧЕНИЯ ЭТОГО ХОСТА. Пустые в шаблоне — установщик заполнит под
  #    твои ответы (порт/подсеть подсосёт из живого awg-контейнера автодетектом,
  #    хост — из ip route как подсказку). В эксплуатации правишь здесь, на
  #    холодную. ОБЯЗАТЕЛЬНЫ — при пустом значении бот падает на старте с
  #    указанием, что задать. ─────────────────────────────────────────────────
  server_host: ""                  # внешний адрес awg-сервера (IP или домен)
  server_port:                     # порт awg-сервера (у докерной Amnezia случайный)

# Параметры клиентского конфига (из эталонного vpn:// приложения)
client_config:
  dns1: "1.1.1.1"
  dns2: "1.0.0.1"
  mtu: 1376
  keepalive_seconds: 25            # PersistentKeepalive
  allowed_ips: "0.0.0.0/0, ::/0"   # полный туннель на стороне клиента
  server_name: "Сервер 1"          # description в vpn:// (видно в приложении)

# Мониторинг co-located хоста: метрики железа (CPU/RAM/диск) бот читает сам
# (/proc + statvfs) каждый тик монитора; сюда — пороги/поведение алертов.
monitoring:
  alert_streak: 5                  # замеров подряд для срабатывания/отбоя ресурс-алерта
  service_failure_alert_loud: true # громкий алерт при устойчивом простое awg
  service_failure_alert_minutes: 5 # порог устойчивого простоя, мин

# Онлайн-детект: устройство «онлайн», если handshake свежее порога (секунды).
# Выравнено с интервалом опроса (5 мин): значение в БД может прокиснуть на возраст
# до целого интервала, порог меньше интервала давал бы ложный «оффлайн».
online_handshake_seconds: 300


# Фоновые интервалы APScheduler (минуты, если не указано иное)
scheduler:
  traffic_poll_minutes: 5          # опрос awg show dump
  expiry_check_minutes: 60         # проверка сроков + уведомления
  monitor_minutes: 3               # мониторинг статуса контейнера/сервиса
  monthly_reset_day: 1             # сброс месячного трафика
  monthly_reset_hour: 0            # 00:00 UTC+3
  backup_day: 1                    # автобэкап
  backup_hour: 12                  # 12:00 UTC+3
  watcher_debounce_seconds: 2      # дебаунс inotify на пачку записей приложения

# Льготные окна APScheduler (секунды): насколько «опоздавший» запуск ещё
# выполняется, а не считается пропущенным.
misfire_grace:
  interval_seconds: 120            # интервальные задачи и стартовые catch-up
  expiry_seconds: 300              # проверка сроков (важнее не пропустить)
  cron_seconds: 3600               # месячные cron-задачи (сброс/бэкап)

# Грациозный детект удаления app-устройства: сколько сверок подряд без peer'а
# в конфиге, прежде чем считать его удалённым (защита от гонки записи).
missing_sweeps_threshold: 2

# Аудит-история: закрытые эпизоды бизнес-процессов переезжают в *_histories и
# хранятся ограниченный срок, после чего вычищаются планировщиком батчами.
history:
  retention_years: 2               # сколько хранить историю (relativedelta years)
  purge_hour: 3                    # ежедневная очистка в 03:00 UTC+3
  purge_batch_size: 500            # строк за один DELETE (батчинг, чтобы не лочить БД)
