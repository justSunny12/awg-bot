# conf/pause.yaml — приостановка подписки клиентом («в отпуск»). Только годовой
# период. При входе тикание останавливается (period_end сдвигается вперёд),
# при выходе — пересчитывается по фактической длине.

pause_max_total_days: 28    # суммарный лимит приостановки за период (единственный лимит)
