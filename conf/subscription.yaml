# conf/subscription.yaml — подписки, периоды, уведомления об истечении.

period_choices: ["day", "week", "month", "year", "never"]   # never = бессрочно
period_labels:
  day: "1 день"
  week: "1 неделя"
  month: "1 месяц"
  year: "1 год"
  never: "Бессрочно"

# Пороги уведомлений об истечении: «за сколько минут до конца» + подпись.
# Шлём только пороги, строго меньшие фактической длительности периода.
notify_thresholds_minutes:
  - [43200, "30 дней"]     # 30*24*60
  - [20160, "14 дней"]     # 14*24*60
  - [10080, "7 дней"]      # 7*24*60
  - [1440,  "1 день"]      # 1*24*60
  - [120,   "2 часа"]
